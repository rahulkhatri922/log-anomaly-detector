services:
  backend:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATA_DIR: /app/data
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:
